seed: 42
progress: true

data:
  dataset_name: "local"
  raw_train_path: "data/train.json"
  raw_test_path: "data/test.json"
  split_dir: "data/appe_splits"
  calib_size: 100
  evo_clean_size: 1000
  guard_size: 200
  test_size: 1000
  seed: 42

prompt:
  base_prompt_path: "config/prompts/base_math.txt"
  cot_prompt_path: "config/prompts/cot_math.txt"
  long_defensive_prompt_path: "config/prompts/long_defensive_math.txt"
  max_tokens: 1500

model:
  backend: "real"
  role: "eval"
  provider: null
  target_model: null
  temperature: 0.0
  max_output_tokens: 64

appe:
  rounds: 5
  clean_batch_size: 32
  attacks_per_sample: 3
  clean_guard_size: 64
  adv_validation_size: 64
  candidate_patches_per_round: 6

attacks:
  seen:
    - numeric_distraction
    - irrelevant_context
    - format_trap
  unseen:
    - logic_inversion
    - variable_confusion
    - misleading_intermediate

memory:
  max_active_patches: 12

controller:
  adv_gain_threshold: 0.02
  clean_drop_threshold: 0.01
  lambda_clean: 1.0
  mu_token: 0.001
  nu_redundancy: 0.5
  rho_conflict: 0.5

outputs:
  dir: "outputs/appe_aaai"

smoke:
  calib_size: 10
  evo_clean_size: 12
  guard_size: 8
  test_size: 10
  rounds: 1
  clean_batch_size: 2
  attacks_per_sample: 1
  clean_guard_size: 4
  adv_validation_size: 4
